<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <th:block th:include="fragments-bootstrap :: common-head"></th:block>
    <title>User table</title>
    <link rel="stylesheet" th:href="@{/css/table-form.css}">

</head>
<body>
<!-- Верхняя строка для емейл, роли и выхода -->
<nav class="navbar navbar-dark bg-dark py-1">
    <div class="container-fluid">
        <div class="navbar-text">
            <strong th:text="${currentUser.email}">Email</strong>
            <span class="ms-2">with roles:
                <th:block th:each="role, iterStart : ${currentUser.roles}">
                <span th:text="${role.name.replace('ROLE_', '')}"></span>
                <span th:if="${not iterStart.last}"> </span>
                </th:block>
            </span>
        </div>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>
<!-- Колонка слева для указания текущей роли -->
<div class="container-fluid p-0 mt-3" >
    <div class="row">
        <div class="col-2 p-0">
            <th:block sec:authorize="hasRole('ADMIN')">
                <ul class="list-unstyled">
                    <li th:class="${view != 'USER'} ? 'bg-primary text-white rounded' : 'text-primary'">
                        <a th:href="@{/admin}"
                           class="d-block"
                           style="padding: 10px 0 10px 25px; text-decoration: none; color: inherit;">Admin
                        </a>
                    <li>
                    <li th:class="${view == 'USER'} ? 'bg-primary text-white rounded' : 'text-primary'">
                        <a th:href="@{/admin(view='USER')}"
                           class="d-block"
                           style="padding: 10px 0 10px 25px; text-decoration: none; color: inherit;">User
                        </a>
                    <li>
                </ul>
            </th:block>
            <th:block sec:authorize="hasRole('USER') and !hasRole('ADMIN')">
                <ul class="list-unstyled">
                    <li class="bg-primary text-white rounded"
                        style="padding: 10px 0 10px 25px">User</li>
                </ul>
            </th:block>
        </div>

        <div class="col-10 bg-light" style="min-height: 100vh;">
            <h1 th:if="${view != 'USER'}" style="padding-left: 20px">Admin panel</h1>
            <h1 th:if="${view == 'USER'}" style="padding-left: 20px">User information-page</h1>

            <!-- Ссылки на вкладки для таблицы и нового пользователя-->
            <ul sec:authorize="hasRole('ADMIN')" th:if="${view != 'USER'}" class="nav nav-tabs mt-3">
                <li class="nav-item ms-3">
                    <a class="nav-link border-bottom-0 px-4" data-bs-toggle="tab" href="#usersTable"
                       th:classappend="${activeTab != 'saveTab'} ? 'active' : ''">
                        Users table
                    </a>
                </li>
                <li class="nav-item me-3">
                    <a class="nav-link px-4" data-bs-toggle="tab" href="#saveTable"
                       th:classappend="${activeTab == 'saveTab'} ? 'active' : ''">
                        New User
                    </a>
                </li>
            </ul>
            <!-- Таблица пользователей для админа и личные данные для отдельного пользователя-->
            <div class="border border-top-0 rounded-bottom" style="background-color: white;">
                <div class="tab-content mt-3" >
                    <div  class="tab-pane fade" id="usersTable"
                          th:classappend="${activeTab != 'saveTab'} ? 'show active' : ''">
                        <h3 th:if="${view != 'USER'}" class="ps-3 py-3 bg-light">All Users</h3>
                        <h3 th:if="${view == 'USER'}" class="ps-3 py-3 bg-light">About user</h3>
                        <hr class="my-3" >
                        <table class="table table-striped table-borderless w-100">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th sec:authorize="hasRole('ADMIN')">Edit</th>
                                <th sec:authorize="hasRole('ADMIN')">Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.firstName}"></td>
                                <td th:text="${user.lastName}"></td>
                                <td th:text="${user.age}"></td>
                                <td th:text="${user.email}"></td>
                                <td>
                                    <span th:each="role, iterStat : ${user.roles}">
                                        <span th:text="${role.name.replace('ROLE_', '')}"></span>
                                        <span th:if="${!iterStat.last}">, </span>
                                    </span>
                                </td>
                                <td sec:authorize="hasRole('ADMIN')">
                                    <button type="button" class="btn btn-sm btn-info text-white"
                                            data-bs-toggle="modal" data-bs-target="#editUserModal"
                                            th:data-user-id="${user.id}"
                                            th:data-user-firstname="${user.firstName}"
                                            th:data-user-lastname="${user.lastName}"
                                            th:data-user-age="${user.age}"
                                            th:data-user-email="${user.email}"
                                            th:data-user-roles-id="${user.roles[0].id}"
                                            th:data-user-roles-name="${user.roles[0].name.replace('ROLE_', '')}">
                                        Edit</button>
                                </td>
                                <td sec:authorize="hasRole('ADMIN')">
                                    <button type="button" class="btn btn-sm btn-danger"
                                            data-bs-toggle="modal" data-bs-target="#deleteUserModal"
                                            th:data-user-id="${user.id}"
                                            th:data-user-firstname="${user.firstName}"
                                            th:data-user-lastname="${user.lastName}"
                                            th:data-user-city="${user.age}"
                                            th:data-user-email="${user.email}"
                                            th:data-user-roles="${user.roles}"
                                    >Delete</button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

            <!-- Вкладка для добавления нового пользователя -->
                     <div class="tab-pane fade" id="saveTable"
                     th:classappend="${activeTab == 'saveTab'} ? 'show active' : ''">
                         <h3 class="ps-3 mb-3">Add new User</h3>
                         <div class="bg-white">
                         <form th:object="${newUser}" th:action="@{/admin/save}" method="post" class="form-group" >
                             <div th:if="${error != null and !error.isEmpty()}" style="color: red; margin-bottom: 15px;">
                                 <strong>❌ошибка:</strong> <span th:text="${error}"></span>
                             </div>
                             <div class="mb-3 text-center">
                                 <label class="form-label">First name</label>
                                 <input type="text" th:field="*{firstName}" class="form-control w-25 mx-auto">

                                 <span th:errors="*{firstName}" style="color: red; margin-bottom: 15px"></span>
                             </div>

                             <div class="mb-3 text-center">
                                 <label class="form-label">Last name</label>
                                 <input type="text" th:field="*{lastName}" class="form-control w-25 mx-auto">
                                 <span th:errors="*{lastName}" style="color: red; margin-bottom: 15px"></span>
                             </div>

                             <div class="mb-3 text-center">
                                 <label class="form-label">Age</label>
                                 <input type="number" th:field="*{age}" class="form-control w-25 mx-auto">
                                 <span th:errors="*{age}" style="color: red; margin-bottom: 15px"></span>
                             </div>

                             <div class="mb-3 text-center">
                                 <label class="form-label">Email</label>
                                 <input type="email" th:field="*{email}" class="form-control w-25 mx-auto">
                                 <span th:errors="*{email}" style="color: red; margin-bottom: 15px"></span>
                             </div>

                             <div class="mb-3 text-center">
                                 <label class="form-label">Password</label>
                                 <input type="text" th:field="*{password}" class="form-control w-25 mx-auto"><br>
                                 <span th:errors="*{password}" style="color: red; margin-bottom: 15px;"></span>
                             </div>

                             <div class="mb-3 text-center">
                                 <label class="form-label">Role</label>
                                 <select th:field="*{roles}" class="form-control w-25 mx-auto">
                                     <option th:each="role : ${allRoles}"
                                             th:value="${role.id}"
                                             th:text="${role.name}"
                                     ></option>
                                 </select>
                             </div>
                             <div class="form-actions">
                                 <button type="submit" class="btn btn-primary">Add new user</button>
                             </div>
                         </form>
                         </div>
                     </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Модальное окно редактирования -->
<div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editUserModalLabel">Update User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                    <form th:object="${user}" th:action="@{/admin/update}" method="post" id="editUserForm">

                    <div th:if="${error != null and !error.isEmpty()}" style="color: red; margin-bottom: 15px;">
                        <strong>❌ошибка:</strong> <span th:text="${error}"></span>
                    </div>

                    <div class="modal-body">
                        <input type="hidden" name="id" id="editUserIdHidden">
                        <input type="hidden" id="openEditModal" th:value="${openEditModal}">
                        <input type="hidden" id="userJson" th:value="${userJson}">
                        <div class="mb-3 text-center">
                            <label class="form-label">ID</label>
                            <input type="text" name="id" id="editId" class="form-control w-50 mx-auto text-center" readonly>
                        </div>

                        <div class="mb-3 text-center">
                            <label class="form-label">First name</label>
                            <input type="text" name="firstName" id="editFirstName" class="form-control w-50 mx-auto text-center">
                            <span th:errors="*{firstName}" style="color: red; margin-bottom: 15px"></span>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">Last name</label>
                            <input type="text" name="lastName" id="editLastName" class="form-control w-50 mx-auto text-center">
                            <span th:errors="*{lastName}" style="color: red; margin-bottom: 15px"></span>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">Age</label>
                            <input type="number" name="age" id="editAge" class="form-control w-50 mx-auto text-center">
                            <span th:errors="*{age}" style="color: red; margin-bottom: 15px"></span>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" id="editEmail" class="form-control w-50 mx-auto text-center">
                            <span th:errors="*{email}" style="color: red; margin-bottom: 15px"></span>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">Password</label>
                            <input type="text" name="password" id="editPassword" class="form-control w-50 mx-auto text-center">
                            <span th:errors="*{password}" style="color: red; margin-bottom: 15px"></span>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">Role</label>
                            <select name="roleId" id="editRoles" class="form-control w-50 mx-auto text-center">
                                <option th:each="role : ${allRoles}"
                                        th:value="${role.id}"
                                        th:text="${role.name}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Edit</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </form>
            </bl>
        </div>
    </div>
</div>

<!-- Модальное окно удаления -->
<div class="modal fade" id="deleteUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteUserModalLabel">Delete User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/delete}" method="post" id="deleteUserForm">
                <div class="modal-body">
                    <input type="hidden" name="id" id="DeleteUserIdHidden">
                    <div class="mb-3 text-center">
                        <label class="form-label">ID</label>
                        <div class="form-control bg-light text-center w-50 mx-auto"
                             style="line-height: 38px; min-height: 38px"
                             id="deleteUserId"></div>
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">First name</label>
                        <div class="form-control bg-light text-center w-50 mx-auto"
                             style="line-height: 38px; min-height: 38px"
                             id="deleteUserFirstName"></div>
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Last name</label>
                        <div class="form-control bg-light text-center w-50 mx-auto"
                             style="line-height: 38px; min-height: 38px"
                             id="deleteUserLastName"></div>
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Age</label>
                        <div class="form-control bg-light text-center w-50 mx-auto"
                             style="line-height: 38px; min-height: 38px"
                             id="deleteUserAge"></div>
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Email</label>
                        <div class="form-control bg-light text-center w-50 mx-auto"
                             style="line-height: 38px; min-height: 38px"
                             id="deleteUserEmail"></div>
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Роль</label>
                        <div class="form-control bg-light text-center w-50 mx-auto"
                             style="line-height: 38px; min-height: 38px"
                             id="deleteUserRoles"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Скрипт для удаления -->
<script>
    const deleteModal = document.getElementById('deleteUserModal')
    if (deleteModal) {
        deleteModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            document.getElementById('DeleteUserIdHidden').value = button.getAttribute('data-user-id')
            document.getElementById('deleteUserId').textContent = button.getAttribute('data-user-id')
            document.getElementById('deleteUserFirstName').textContent = button.getAttribute('data-user-firstname')
            document.getElementById('deleteUserLastName').textContent = button.getAttribute('data-user-lastname')
            document.getElementById('deleteUserAge').textContent = button.getAttribute('data-user-age')
            document.getElementById('deleteUserEmail').textContent = button.getAttribute('data-user-email')
            const rolesRaw = button.getAttribute('data-user-roles');
            const roles = rolesRaw.replace(/Role\(id=\d+, name=/g, '').replace(/\)/g, '').replace(/ROLE_/g, '');
            document.getElementById('deleteUserRoles').textContent = roles;
        })
    }
</script>
<!-- Скрипт для обновления -->
<script th:inline="javascript">
    const editModal = document.getElementById('editUserModal')
    if (editModal) {
        editModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            if (button) {
                document.getElementById('editUserIdHidden').value = button.getAttribute('data-user-id')
                document.getElementById('editId').value = button.getAttribute('data-user-id')
                document.getElementById('editFirstName').value = button.getAttribute('data-user-firstname')
                document.getElementById('editLastName').value = button.getAttribute('data-user-lastname')
                document.getElementById('editAge').value = button.getAttribute('data-user-age')
                document.getElementById('editEmail').value = button.getAttribute('data-user-email')
                document.getElementById('editPassword').value = button.getAttribute('data-user-password')
                document.getElementById('editRoles').value = button.getAttribute('data-user-roles-id')
            }
        })
    }
    // проверка на открытие после ошибки в поле
    const openEditModal = document.getElementById('openEditModal').value === 'true';
    if (openEditModal) {
        const userJs = JSON.parse(document.getElementById('userJson').value)
        document.getElementById('editUserIdHidden').value = userJs.id
        document.getElementById('editId').value = userJs.id;
        document.getElementById('editFirstName').value = userJs.firstName;
        document.getElementById('editLastName').value = userJs.lastName;
        document.getElementById('editAge').value = userJs.age;
        document.getElementById('editEmail').value = userJs.email;
        document.getElementById('editPassword').value = userJs.password;
        const editModal = new bootstrap.Modal(document.getElementById('editUserModal'));
        editModal.show();
    }
</script>
</body>
</html>
